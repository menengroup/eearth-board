services:
  - type: web
    name: eearth-board
    env: python
    region: oregon
    plan: starter
    pythonVersion: "3.11.0"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
        healthCheckPath: /api/health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure random value
      - key: ADMIN_EMAIL
        sync: false   # Set to your email in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false   # Set your admin password in Render dashboard
      - key: DATABASE_PATH
        value: /opt/render/project/src/eearth_board.db
    disk:
      name: eearth-data
      mountPath: /opt/render/project/src
      sizeGB: 1
